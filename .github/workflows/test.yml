name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project 
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Solhint
        run: |
          npm install -g solhint
          solhint 'src//*.sol'  

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvvv

      - name: Run Slither
        uses: crytic/slither-action@v0.4.1
        with:
          target: '.'
          fail-on: medium

      - name: Run Coverage and Filter
        run: |
          sudo apt-get install lcov -y
          
          # 1. Generate the raw lcov data
          forge coverage --report lcov --ir-minimum

          # 2. Filter out scripts, tests, and vendored upgrade helpers from the threshold
          lcov --remove lcov.info 'script/*' 'test/*' 'src/AMMUpgradeHelpers.sol' --ignore-errors unused -o filtered-lcov.info

          # 3. Save the summary to the file name the upload step expects
          lcov --list filtered-lcov.info > coverage_report.md

          # 4. Extract the percentage for the logs and threshold check
          # Using grep -oE to reliably find the number regardless of table width
          COVERAGE=$(grep "Total:" coverage_report.md | grep -oE "[0-9]+\.[0-9]+" | head -1)
          echo "Coverage: $COVERAGE%"

          # 5. Professional Touch: Add the report to the GitHub UI Summary
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage_report.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report.md

      - name: Write Summary
        run: cat coverage_report.md >> $GITHUB_STEP_SUMMARY